<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f1a" />
  <meta name="color-scheme" content="dark" />
  <title>Archive Pro — DUNGZAK CESTLAVIE LAB</title>
  <meta name="description" content="Archive Pro — artwork archive engine for search, filter, and zoom view." />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <div class="brand-wrap">
        <p class="eyebrow">DUNGZAK CESTLAVIE LAB</p>
        <h1>ARCHIVE PRO</h1>
        <p class="subline">Search, filter, access.</p>
      </div>

      <a class="back-link" href="../index.html">LAB</a>
    </header>

    <main class="main-layout">
      <section class="control-panel" aria-label="Archive controls">
        <div class="search-row">
          <label class="sr-only" for="searchInput">Search artworks</label>
          <input
            id="searchInput"
            class="search-input"
            type="search"
            placeholder="Search by ID or title (e.g. OR-690)"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="clearSearchBtn" class="ghost-button" type="button">Clear</button>
        </div>

        <div class="filter-row" role="tablist" aria-label="Artwork sections">
          <button class="filter-chip is-active" type="button" data-filter="all">All</button>
          <button class="filter-chip" type="button" data-filter="0">Origins</button>
          <button class="filter-chip" type="button" data-filter="1">I</button>
          <button class="filter-chip" type="button" data-filter="2">II</button>
          <button class="filter-chip" type="button" data-filter="3">III</button>
          <button class="filter-chip" type="button" data-filter="4">IV</button>
          <button class="filter-chip" type="button" data-filter="5">V</button>
        </div>

        <div class="sort-row">
          <label for="sortSelect">Sort</label>
          <select id="sortSelect" class="sort-select">
            <option value="id-asc">ID ↑</option>
            <option value="id-desc">ID ↓</option>
          </select>
        </div>

        <div class="meta-row" aria-live="polite">
          <span id="resultCount">0 works</span>
          <span id="statusLine">Loading archive...</span>
        </div>
      </section>

      <section class="grid-section" aria-label="Artwork results">
        <div id="artGrid" class="art-grid"></div>
        <div id="emptyState" class="empty-state" hidden>No works found.</div>
      </section>
    </main>
  </div>

  <dialog id="viewer" class="viewer">
    <div class="viewer-shell">
      <button class="viewer-close" id="closeViewerBtn" type="button" aria-label="Close">×</button>

      <div class="viewer-content">
        <button class="nav-button prev-button" id="prevBtn" type="button" aria-label="Previous work">‹</button>

        <figure class="viewer-figure">
          <img id="viewerImage" src="" alt="" />
          <figcaption class="viewer-caption">
            <p id="viewerId" class="viewer-id"></p>
            <p id="viewerSection" class="viewer-section"></p>
            <p id="viewerTitle" class="viewer-title"></p>
            <p id="viewerMaterial" class="viewer-material"></p>
            <p id="viewerSize" class="viewer-size"></p>
            <p id="viewerYear" class="viewer-year"></p>
          </figcaption>
        </figure>

        <button class="nav-button next-button" id="nextBtn" type="button" aria-label="Next work">›</button>
      </div>
    </div>
  </dialog>

  <script src="./app.js"></script>
</body>
</html>
